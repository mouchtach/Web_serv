server {
    listen 8080;
    server_name localhost;
    # host 127.0.0.1;
    root ./www;
    index index.html;
    client_max_body_size 1000000;
    error_page 404 error_pages/404.html;
    error_page 403 error_pages/403.html;

    location / {
        methods GET;
        autoindex off;
        index index.html;
    }

    location /images {
        methods GET;
        autoindex on;
    }

    location /assets {
        methods GET;
        autoindex off;
    }

    location /uploads {
        methods POST DELETE;
    }

    location /redirect {
        return /index.html;
    }
}