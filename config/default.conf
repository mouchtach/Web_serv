server
{
    listen 8081;
    server_name localhost;

    root ./www;
    index index.html;
    autoindex on;

    client_max_body_size 2000000;

    error_page 404 ./errors/404.html;
    error_page 403 ./errors/403.html;

    location /
    {
        methods GET;
        autoindex off;
    }
    location /home
    {
        return 301 /;
    }

    location /docs
    {
        root ./www/docs;
        index index.html;
        methods GET POST;
        autoindex on;
    }

    location /static
    {
        root ./assets;
        methods GET;
    }

    location /static/images
    {
        root ./assets/images;
        autoindex on;
    }

    location /download
    {
        root ./files;
        methods GET;
        autoindex off;
    }

    location /upload
    {
        root ./uploads;
        methods POST;
    }

    location /cgi
    {
        root ./cgi;
        methods GET POST;
        cgi_extension .py;
        cgi_path /usr/bin/python3;
    }
}

server
{
    listen 9091;
    server_name test.local;

    root ./site2;
    index home.html;

    location /
    {
        methods GET POST DELETE;
    }

    location /admin
    {
        root ./admin;
        methods GET;
        autoindex off;
    }
}