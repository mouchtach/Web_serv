<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>500 — Internal Server Error</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="error-page">
<div class="error-card">
  <div class="error-icon">500</div>
  <div class="error-code err">Internal Server Error</div>
  <div class="error-status">Something broke while building this response</div>
  <div class="error-msg">
    <div class="prompt-line"><span>&gt;</span> unhandled failure while processing the request</div>
    Something went wrong on the server's side. Check the server logs — this one isn't caused by anything you sent.
  </div>
  <div class="error-actions"><a href="/">Back to home</a></div>
</div>
</body>
</html>
