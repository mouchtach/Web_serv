<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>413 — Payload Too Large</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="error-page">
<div class="error-card">

  <div class="term" style="margin-bottom:26px;">
    <div class="term-bar">
      <span class="term-dot amber"></span>
      <span class="term-dot"></span>
      <span class="term-dot"></span>
      <span class="term-title">body — over limit</span>
    </div>
  </div>

  <div class="error-code warn">413</div>
  <div class="error-status">Payload Too Large</div>

  <div class="error-msg">
    <div class="prompt-line"><span>$</span> content-length exceeds client_max_body_size</div>
    the request body is larger than this server allows. reduce the payload or
    raise the limit in the config block for this server.
  </div>

  <div class="error-actions">
    <a href="/">cd /</a>
  </div>

</div>
</body>
</html>
