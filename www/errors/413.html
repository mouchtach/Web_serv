<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>413 — Payload Too Large</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="error-page">
<div class="error-card">
  <div class="error-icon">413</div>
  <div class="error-code warn">Payload Too Large</div>
  <div class="error-status">The request body exceeds the limit</div>
  <div class="error-msg">
    <div class="prompt-line"><span>&gt;</span> content-length exceeds client_max_body_size</div>
    The request body is larger than this server allows. Reduce the payload or raise the limit in the config block for this server.
  </div>
  <div class="error-actions"><a href="/">Back to home</a></div>
</div>
</body>
</html>
