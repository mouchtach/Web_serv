<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Not Found</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="error-page">
<div class="error-card">
  <div class="error-icon">404</div>
  <div class="error-code warn">Not Found</div>
  <div class="error-status">Nothing matches this path</div>
  <div class="error-msg">
    <div class="prompt-line"><span>&gt;</span> stat() found nothing at this location</div>
    No file or directory matches the requested URI under this location's root. Check the address, or confirm the route in your config.
  </div>
  <div class="error-actions"><a href="/">Back to home</a></div>
</div>
</body>
</html>
