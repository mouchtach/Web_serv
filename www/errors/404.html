<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Not Found</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="error-page">
<div class="error-card">

  <div class="term" style="margin-bottom:26px;">
    <div class="term-bar">
      <span class="term-dot amber"></span>
      <span class="term-dot"></span>
      <span class="term-dot"></span>
      <span class="term-title">lookup — miss</span>
    </div>
  </div>

  <div class="error-code warn">404</div>
  <div class="error-status">Not Found</div>

  <div class="error-msg">
    <div class="prompt-line"><span>$</span> stat() found nothing at this path</div>
    no file or directory matches the requested URI under this location's root.
    check the address, or confirm the route in your config.
  </div>

  <div class="error-actions">
    <a href="/">cd /</a>
  </div>

</div>
</body>
</html>
