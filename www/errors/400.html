<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>400 — Bad Request</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="error-page">
<div class="error-card">
  <div class="error-icon">400</div>
  <div class="error-code warn">Bad Request</div>
  <div class="error-status">The request could not be parsed</div>
  <div class="error-msg">
    <div class="prompt-line"><span>&gt;</span> parser rejected the request before it reached a handler</div>
    A malformed request line, an unparsable header, or a missing terminator. Fix the request and try again.
  </div>
  <div class="error-actions"><a href="/">Back to home</a></div>
</div>
</body>
</html>
