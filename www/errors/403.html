<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>403 — Forbidden</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="error-page">
<div class="error-card">

  <div class="term" style="margin-bottom:26px;">
    <div class="term-bar">
      <span class="term-dot amber"></span>
      <span class="term-dot"></span>
      <span class="term-dot"></span>
      <span class="term-title">access — denied</span>
    </div>
  </div>

  <div class="error-code warn">403</div>
  <div class="error-status">Forbidden</div>

  <div class="error-msg">
    <div class="prompt-line"><span>$</span> read access denied</div>
    the target exists, but this server won't serve it — a directory with autoindex off,
    or a path outside what this location is allowed to expose.
  </div>

  <div class="error-actions">
    <a href="/">cd /</a>
  </div>

</div>
</body>
</html>
