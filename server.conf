server
{
    listen 8080;
    server_name localhost;
    root .;
    index index.html;
    client_max_body_size 1000000;
    error_page 404 ./errors/404.html;
    error_page 403 ./errors/403.html;
    error_page 500 ./errors/500.html;
    
    location /
    {
        # root /;
        index index.html;
        methods GET POST;
    }
    location /images
    {
        root ./assets/images;
        methods GET;
        autoindex on;
    }
    location /images/hh
    {
        root ./assets/images;
        # methods GET;
        autoindex on;
    }
    location /upload
    {
        root ./uploads;
        # methods GET POST DELETE;
    }
    location /cgi-bin
    {
        root ./cgi-bin;
        methods GET POST;
        cgi_extension .py;
        cgi_path /usr/bin/python3;
    }
}

