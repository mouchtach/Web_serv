# WebServ Configuration - Enhanced Version

# ============================================
# SERVER 1: Main Server (localhost:8081)
# ============================================
server
{
    listen 8081;
    server_name 127.0.0.1;

    root ./www;
    index index.html;
    
    # Maximum request body size (2MB)
    client_max_body_size 2000000;

    # Custom error pages
    error_page 400 ./www/errors/400.html;
    error_page 403 ./www/errors/403.html;
    error_page 404 ./www/errors/404.html;
    error_page 405 ./www/errors/405.html;
    error_page 500 ./www/errors/500.html;
    error_page 501 ./www/errors/501.html;
    error_page 502 ./www/errors/502.html;
    error_page 505 ./www/errors/505.html;

    # Root location - Directory listing enabled
    location /
    {
        methods GET;
        autoindex on;
    }

    # Redirect test: /home -> /
    location /home
    {
        return 301 /;
    }

    # Documentation area
    location /docs
    {
        root ./www/docs;
        index index.html;
        methods GET POST;
        autoindex on;
    }

    # Static assets (CSS, JS, generic files)
    location /static
    {
        root ./assets;
        methods GET;
    }

    # Images subdirectory with autoindex
    location /static/images
    {
        root ./assets/images;
        autoindex on;
    }

    # File downloads
    location /download
    {
        root ./files;
        methods GET;
        autoindex off;
    }

    # File uploads (POST only)
    location /upload
    {
        root ./uploads;
        methods POST;
        # Upload handling
    }

    # CGI execution
    location /cgi
    {
        root ./cgi;
        methods GET POST;
        cgi_extension .py;
        cgi_path /usr/bin/python3;
    }
}

# ============================================
# SERVER 2: Alternative Server (test.local:9091)
# ============================================
server
{
    listen 9091;
    server_name test.local;

    root ./site2;
    index home.html;
    autoindex on;

    location /
    {
        methods GET POST DELETE;
    }

    location /admin
    {
        root ./admin;
        methods GET;
        autoindex off;
    }
}