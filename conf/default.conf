server
{
    listen 8081;
    server_name localhost;

    root ./www;
    index index.html;

    client_max_body_size 20000000;

    error_page 400 ./www/errors/400.html;
    error_page 403 ./www/errors/403.html;
    error_page 404 ./www/errors/404.html;
    error_page 405 ./www/errors/405.html;
    error_page 413 ./www/errors/413.html;
    error_page 500 ./www/errors/500.html;

    # console page (www/index.html) — file manager, cgi runner, tester
    location /
    {
        methods GET;
        autoindex off;
    }

    # error pages, directly browsable too
    location /errors
    {
        root ./www/errors;
        methods GET;
        autoindex off;
    }

    # shared stylesheet
    location /static
    {
        root ./assets;
        methods GET;
        autoindex off;
    }

    # file manager backend — GET lists (autoindex), POST uploads, DELETE removes
    location /upload
    {
        root ./uploads;
        methods GET POST DELETE;
        # autoindex on;
    }

    # cgi demo — requires the CGI handler to be implemented
    location /cgi
    {
        root ./cgi;
        methods GET POST;
        cgi_extension .py;
        cgi_path /usr/bin/python3;
    }
}
