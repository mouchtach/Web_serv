server
{
    listen 8081;
    server_name localhost;

    root ./www;
    index index.html;

    # 20 MB — assez pour le test "15MB OK" (section 7)
    # et trop petit pour le test "25MB -> 413" (section 8)
    client_max_body_size 20000000;

    error_page 404 ./www/errors/404.html;
    error_page 403 ./www/errors/403.html;
    error_page 400 ./www/errors/400.html;
    error_page 405 ./www/errors/405.html;
    error_page 413 ./www/errors/413.html;
    error_page 500 ./www/errors/500.html;

    # ------------------------------------------------
    # section 1, 4, 5, 11 : GET / , 404, path traversal, concurrence
    # ------------------------------------------------
    location /
    {
        methods GET;
        autoindex on;
    }

    # ------------------------------------------------
    # section 2 : redirection 301
    # ------------------------------------------------
    location /home
    {
        return 301 /;
    }

    # ------------------------------------------------
    # section 3 : 405 method not allowed (GET only)
    # ------------------------------------------------
    location /static
    {
        root ./assets;
        methods GET;
        autoindex off;
    }

    # section 5 : autoindex -> "Index of ..."
    location /static/images
    {
        root ./assets/images;
        methods GET;
        autoindex on;
    }

    # ------------------------------------------------
    # section 6, 7, 8, 9 : upload / download / delete
    # GET  -> telecharger le fichier (section 7 download)
    # POST -> uploader (section 6, 7, 8)
    # DELETE -> supprimer (section 9)
    # ------------------------------------------------
    location /upload
    {
        root ./uploads;
        methods GET POST DELETE;
        autoindex on;
    }
}